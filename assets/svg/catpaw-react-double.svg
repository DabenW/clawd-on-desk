<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 45 45" width="500" height="500">
  <defs>
    <style>
      .body-react {
        animation: body-panic 3.5s 1 ease-in-out forwards;
      }
      .eyes-react {
        animation: eyes-panic 3.5s 1 ease-in-out forwards;
      }
      .eyes-blink {
        transform-origin: 12px 11px;
        animation: blink 3s infinite linear;
      }
      .question-pop {
        transform-origin: center;
        animation: question-fade 3.5s 1 ease-in-out forwards;
        opacity: 0;
      }
      .exclamation-pop {
        transform-origin: center;
        animation: excl-fade 3.5s 1 ease-in-out forwards;
        opacity: 0;
      }

      /* Frantic left-right looking */
      @keyframes body-panic {
        0%, 4%   { transform: translate(0px, 0px); }
        10%, 18% { transform: translate(-1px, 0px); }
        24%, 32% { transform: translate(1px, 0px); }
        36%      { transform: translate(-1px, 0px); }
        40%      { transform: translate(1px, 0px); }
        46%, 72% { transform: translate(1px, -1px); }
        82%, 100%{ transform: translate(0px, 0px); }
      }

      @keyframes eyes-panic {
        0%, 4%   { transform: translate(0px, 0px); }
        10%, 18% { transform: translate(-2px, 0px); }
        24%, 32% { transform: translate(2px, 0px); }
        36%      { transform: translate(-2px, 0px); }
        40%      { transform: translate(2px, 0px); }
        46%, 72% { transform: translate(3px, -2px); }
        82%, 100%{ transform: translate(0px, 0px); }
      }

      @keyframes blink {
        0%, 20%, 24%, 60%, 64%, 80%, 84%, 100% { transform: scaleY(1); }
        22%, 62%, 82% { transform: scaleY(0.1); }
      }

      /* Question mark appears early (while looking left) */
      @keyframes question-fade {
        0%, 6%   { opacity: 0; transform: translate(0px, 4px) scale(0.5); }
        12%, 38% { opacity: 1; transform: translate(0px, 0px) scale(1); }
        44%, 100%{ opacity: 0; transform: translate(0px, -4px) scale(1.2); }
      }

      /* Exclamation appears later (while staring up-right) */
      @keyframes excl-fade {
        0%, 42%  { opacity: 0; transform: translate(12px, 0px) scale(0.5); }
        48%, 72% { opacity: 1; transform: translate(12px, -4px) scale(1); }
        80%, 100%{ opacity: 0; transform: translate(12px, -8px) scale(1.2); }
      }
    </style>
  </defs>

  <!-- Ground Shadow -->
  <rect x="3" y="23" width="18" height="1" fill="#000000" opacity="0.3"/>

  <!-- Static Legs -->
  <g fill="#111111">
    <rect x="7" y="21" width="2" height="2"/>
    <rect x="15" y="21" width="2" height="2"/>
  </g>

  <!-- Animated Upper Body -->
  <g class="body-react">
    <!-- Tail -->
    <rect x="19" y="18" width="2" height="2" fill="#111111"/>
    <rect x="21" y="15" width="2" height="4" fill="#111111"/>
    <rect x="22" y="12" width="2" height="4" fill="#111111"/>
    <rect x="23" y="9" width="2" height="4" fill="#111111"/>

    <!-- Ears -->
    <rect x="6" y="3" width="2" height="4" fill="#111111"/>
    <rect x="7" y="2" width="1" height="1" fill="#111111"/>
    <rect x="16" y="3" width="2" height="4" fill="#111111"/>
    <rect x="16" y="2" width="1" height="1" fill="#111111"/>
    
    <!-- Head and Torso -->
    <rect x="6" y="6" width="12" height="1" fill="#111111"/>
    <rect x="5" y="7" width="14" height="14" fill="#111111"/>
    <rect x="6" y="21" width="12" height="1" fill="#111111"/>

    <!-- Arms -->
    <rect x="3" y="14" width="2" height="2" fill="#111111"/>
    <rect x="19" y="14" width="2" height="2" fill="#111111"/>

    <!-- Eyes -->
    <g class="eyes-react">
      <g class="eyes-blink">
        <!-- Left Eye -->
        <rect x="6" y="10" width="5" height="3" fill="#FFFFFF"/>
        <rect x="7" y="13" width="3" height="1" fill="#FFFFFF"/>
        <rect x="8" y="10" width="2" height="2" fill="#111111"/>

        <!-- Right Eye -->
        <rect x="13" y="10" width="5" height="3" fill="#FFFFFF"/>
        <rect x="14" y="13" width="3" height="1" fill="#FFFFFF"/>
        <rect x="14" y="10" width="2" height="2" fill="#111111"/>
      </g>
    </g>
  </g>

  <!-- Question Mark (left side) -->
  <g class="question-pop" fill="#FFFFFF">
    <rect x="1" y="0" width="2" height="1"/>
    <rect x="0" y="1" width="1" height="1"/>
    <rect x="3" y="1" width="1" height="2"/>
    <rect x="2" y="3" width="1" height="1"/>
    <rect x="1" y="4" width="1" height="1"/>
    <rect x="1" y="6" width="1" height="1"/>
  </g>

  <!-- Exclamation Mark (right side) -->
  <g class="exclamation-pop" fill="#0082FC">
    <rect x="1" y="0" width="1" height="4"/>
    <rect x="1" y="5" width="1" height="1"/>
  </g>
</svg>