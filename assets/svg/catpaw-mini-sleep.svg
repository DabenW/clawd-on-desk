<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 45 45" width="500" height="500"
  shape-rendering="crispEdges">
  <defs>
    <clipPath id="body-clip">
      <rect x="6" y="6" width="12" height="1" />
      <rect x="5" y="7" width="14" height="14" />
      <rect x="6" y="21" width="12" height="1" />
    </clipPath>
    <style>
      /* Slower breathing for sleepy feel */
      .breathe-anim {
        transform-origin: 12px 23px;
        animation: breathe 5s infinite ease-in-out;
      }

      /* Very slow, barely noticeable arm drift */
      .arm-wobble {
        transform-origin: 5px 15px;
        animation: arm-drift 50s infinite ease-in-out;
      }

      /* Zzz particles (same style as clawd-sleeping.svg) */
      .z-particle { opacity: 0; }
      .z1 { animation: float-1 6s infinite ease-in-out 0s; }
      .z2 { animation: float-2 6s infinite ease-in-out 2s; }
      .z3 { animation: float-3 6s infinite ease-in-out 4s; }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.015, 0.985) translate(0, 0.3px); }
      }

      @keyframes arm-drift {
        0%, 94%, 100% { transform: rotate(0deg); }
        96% { transform: rotate(3deg); }
        98% { transform: rotate(-1deg); }
      }

      /* Zzz floats left and up (away from screen edge) */
      @keyframes float-1 {
        0%   { transform: translate(3px, 6px) scale(0.4); opacity: 0; }
        10%  { opacity: 1; }
        30%  { transform: translate(0px, 3px) scale(0.6); }
        50%  { transform: translate(2px, 0px) scale(0.8); }
        70%  { transform: translate(-1px, -3px) scale(1.0); }
        90%  { opacity: 0.8; }
        100% { transform: translate(1px, -6px) scale(1.1); opacity: 0; }
      }

      @keyframes float-2 {
        0%   { transform: translate(2px, 7px) scale(0.3); opacity: 0; }
        10%  { opacity: 1; }
        30%  { transform: translate(-1px, 4px) scale(0.5); }
        50%  { transform: translate(1px, 1px) scale(0.7); }
        70%  { transform: translate(-2px, -2px) scale(0.9); }
        90%  { opacity: 0.8; }
        100% { transform: translate(0px, -5px) scale(1.0); opacity: 0; }
      }

      @keyframes float-3 {
        0%   { transform: translate(4px, 5px) scale(0.5); opacity: 0; }
        10%  { opacity: 1; }
        30%  { transform: translate(1px, 2px) scale(0.7); }
        50%  { transform: translate(3px, -1px) scale(0.9); }
        70%  { transform: translate(0px, -4px) scale(1.1); }
        90%  { opacity: 0.8; }
        100% { transform: translate(2px, -7px) scale(1.2); opacity: 0; }
      }
    </style>

    <g id="pixel-z">
      <rect x="0" y="0" width="4" height="1"/>
      <rect x="2" y="1" width="1" height="1"/>
      <rect x="1" y="2" width="1" height="1"/>
      <rect x="0" y="3" width="4" height="1"/>
    </g>

    <g id="pixel-z-small">
      <rect x="0" y="0" width="3" height="1"/>
      <rect x="1" y="1" width="1" height="1"/>
      <rect x="0" y="2" width="3" height="1"/>
    </g>
  </defs>

  <!-- Zzz particles -->
  <use href="#pixel-z" class="z-particle z1" fill="#90A4AE"/>
  <use href="#pixel-z-small" class="z-particle z2" fill="#B0BEC5"/>
  <use href="#pixel-z" class="z-particle z3" fill="#CFD8DC"/>

  <g transform="rotate(-12, 12, 23)">
    <g fill="#111111">
      <rect x="7" y="21" width="2" height="2"/>
      <rect x="15" y="21" width="2" height="2"/>
    </g>

    <g id="body-js">
      <g class="breathe-anim">
        <!-- Tail -->
        <rect x="19" y="18" width="2" height="2" fill="#111111"/>
        <rect x="21" y="15" width="2" height="4" fill="#111111"/>
        <rect x="22" y="12" width="2" height="4" fill="#111111"/>
        <rect x="23" y="9" width="2" height="4" fill="#111111"/>

        <!-- Ears -->
        <rect x="6" y="3" width="2" height="4" fill="#111111"/>
        <rect x="7" y="2" width="1" height="1" fill="#111111"/>
        <rect x="16" y="3" width="2" height="4" fill="#111111"/>
        <rect x="16" y="2" width="1" height="1" fill="#111111"/>
        
        <!-- Head and Torso -->
        <rect x="6" y="6" width="12" height="1" fill="#111111"/>
        <rect x="5" y="7" width="14" height="14" fill="#111111"/>
        <rect x="6" y="21" width="12" height="1" fill="#111111"/>

        <g class="arm-wobble">
          <rect x="3" y="14" width="2" height="2" fill="#111111"/>
        </g>

        <rect x="19" y="14" width="2" height="2" fill="#111111"/>

        <!-- Eyes closed — wide dashes like sleeping pose -->
        <g clip-path="url(#body-clip)">
          <g id="eyes-js" fill="#FFFFFF">
            <rect x="6" y="11" width="5" height="1"/>
            <rect x="13" y="11" width="5" height="1"/>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>