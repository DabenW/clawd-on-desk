<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 45 45" width="500" height="500">
  <defs>
    <style>
      /* 10-Second Idle Loop — Looking Around + Scratching (no yawn) */
      .action-body {
        transform-origin: 12px 20px;
        animation: action-body 10s infinite ease-in-out;
      }

      .breathe-anim {
        transform-origin: 12px 20px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      .shadow-anim {
        transform-origin: 12px 23.5px;
        animation: shadow-action 10s infinite ease-in-out;
      }

      .arm-l {
        transform-origin: 5px 15px;
        animation: arm-l-idle 10s infinite ease-in-out;
      }

      .eyes-look {
        animation: eye-track 10s infinite ease-in-out;
      }

      .eyes-blink {
        transform-origin: 12px 11px;
        animation: eye-blink 10s infinite linear;
      }

      /* --- Keyframes --- */

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      @keyframes action-body {
        0%, 8%, 25%, 30%, 40%, 45%, 60%, 100% { transform: scale(1,1) translate(0,0); }
        /* Look Right */
        12%, 22% { transform: scale(1,1) translate(1px, 0); }
        /* Look Left */
        48%, 57% { transform: scale(1,1) translate(-1px, 0); }
        /* Scratch Lean */
        33%, 38% { transform: scale(1,1) translate(0.5px, 0); }
      }

      @keyframes shadow-action {
        0%, 8%, 25%, 30%, 40%, 45%, 60%, 100% { transform: scaleX(1) translate(0,0); opacity: 0.3; }
        12%, 22% { transform: scaleX(1) translate(1px, 0); opacity: 0.3; }
        48%, 57% { transform: scaleX(1) translate(-1px, 0); opacity: 0.3; }
        33%, 38% { transform: scaleX(1) translate(0.5px, 0); opacity: 0.3; }
      }

      @keyframes eye-track {
        0%, 10%, 25%, 43%, 60%, 100% { transform: translate(0, 0); }
        12%, 22% { transform: translate(3px, 0); }  /* Look Right */
        48%, 57% { transform: translate(-3px, 0); }  /* Look Left */
      }

      @keyframes eye-blink {
        0%, 3%, 7%, 18%, 22%, 47%, 51%, 78%, 82%, 100% { transform: scaleY(1); }
        5%, 20%, 49%, 80% { transform: scaleY(0.1); }
      }

      @keyframes arm-l-idle {
        0%, 30% { transform: translate(0,0) rotate(0deg); }
        /* Scratching Sequence */
        33% { transform: translate(1px, -3px) rotate(15deg); }
        34% { transform: translate(1.5px, -4px) rotate(35deg); }
        35% { transform: translate(0.5px, -2.5px) rotate(0deg); }
        36% { transform: translate(1.5px, -4px) rotate(35deg); }
        37% { transform: translate(0.5px, -2.5px) rotate(0deg); }
        38% { transform: translate(1.5px, -4px) rotate(35deg); }
        39% { transform: translate(0.5px, -2.5px) rotate(0deg); }
        42%, 100% { transform: translate(0,0) rotate(0deg); }
      }
    </style>
  </defs>

  <!-- Ground Shadow -->
  <g id="ground-shadow" class="shadow-anim">
    <rect x="3" y="23" width="18" height="1" fill="#000000" opacity="0.3"/>
  </g>

  <!-- Static Legs -->
  <g id="legs" fill="#111111">
    <rect x="7" y="21" width="2" height="2"/>
    <rect x="15" y="21" width="2" height="2"/>
  </g>

  <!-- Animated Upper Body -->
  <g class="action-body">
    <g class="breathe-anim">
      <!-- Tail -->
      <rect x="19" y="18" width="2" height="2" fill="#111111"/>
      <rect x="21" y="15" width="2" height="4" fill="#111111"/>
      <rect x="22" y="12" width="2" height="4" fill="#111111"/>
      <rect x="23" y="9" width="2" height="4" fill="#111111"/>

      <!-- Ears -->
      <rect x="6" y="3" width="2" height="4" fill="#111111"/>
      <rect x="7" y="2" width="1" height="1" fill="#111111"/>
      <rect x="16" y="3" width="2" height="4" fill="#111111"/>
      <rect x="16" y="2" width="1" height="1" fill="#111111"/>
      
      <!-- Head and Torso -->
      <rect x="6" y="6" width="12" height="1" fill="#111111"/>
      <rect x="5" y="7" width="14" height="14" fill="#111111"/>
      <rect x="6" y="21" width="12" height="1" fill="#111111"/>
      
      <!-- Arms -->
      <g class="arm-l">
        <rect x="3" y="14" width="2" height="2" fill="#111111"/>
      </g>
      <rect x="19" y="14" width="2" height="2" fill="#111111"/>

      <!-- Eyes -->
      <g class="eyes-look">
        <g class="eyes-blink">
          <!-- Left Eye -->
          <rect x="6" y="10" width="5" height="3" fill="#FFFFFF"/>
          <rect x="7" y="13" width="3" height="1" fill="#FFFFFF"/>
          <rect x="8" y="10" width="2" height="2" fill="#111111"/>

          <!-- Right Eye -->
          <rect x="13" y="10" width="5" height="3" fill="#FFFFFF"/>
          <rect x="14" y="13" width="3" height="1" fill="#FFFFFF"/>
          <rect x="14" y="10" width="2" height="2" fill="#111111"/>
        </g>
      </g>
    </g>
  </g>
</svg>