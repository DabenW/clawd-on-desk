<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 45 45" width="500" height="500">
  <defs>
    <style>
      .breathe-anim {
        transform-origin: 12px 23px;
        animation: breathe 3.2s infinite ease-in-out;
      }

      /* Happy arm wave — continuous, fast, fixed pivot at shoulder */
      .arm-happy {
        transform-origin: 5px 15px; /* Shoulder joint in SVG coords, no fill-box */
        animation: arm-happy-wave 0.4s infinite alternate ease-in-out;
      }

      /* Eyes ^^ blink — mostly ^^ with occasional full blink */
      .eyes-happy-blink {
        transform-origin: 12px 11px;
        animation: happy-blink 3s infinite ease-in-out;
      }

      /* Pixel-Art Sparkle Animations */
      .spark-center {
        opacity: 0;
        animation: flash-center 1.5s infinite step-end;
        animation-delay: var(--delay, 0s);
      }
      .spark-outer {
        opacity: 0;
        animation: flash-outer 1.5s infinite step-end;
        animation-delay: var(--delay, 0s);
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      /* Continuous happy waving */
      @keyframes arm-happy-wave {
        0% { transform: rotate(22deg); }
        100% { transform: rotate(-8deg); }
      }

      /* Happy blink: frequent blinks to look excited */
      @keyframes happy-blink {
        0%, 12%, 30%, 42%, 100% { transform: scaleY(1); }
        6% { transform: scaleY(0.1); }
        36% { transform: scaleY(0.1); }
      }

      @keyframes flash-center {
        0%  { opacity: 0; }
        10% { opacity: 1; }
        30% { opacity: 0; }
        100%{ opacity: 0; }
      }
      @keyframes flash-outer {
        0%  { opacity: 0; }
        20% { opacity: 1; }
        40% { opacity: 0; }
        100%{ opacity: 0; }
      }
    </style>

    <!-- Reusable Pixel Art Sparkle (from clawd-happy.svg) -->
    <g id="px-sparkle">
      <rect class="spark-center" x="-0.5" y="-0.5" width="1" height="1" />
      <path class="spark-outer" d="M -0.5,-1.5 h1 v1 h-1 z
                                   M -0.5,0.5 h1 v1 h-1 z
                                   M -1.5,-0.5 h1 v1 h-1 z
                                   M 0.5,-0.5 h1 v1 h-1 z" />
    </g>
  </defs>

  <!-- Entire character leaning -->
  <g transform="rotate(-12, 12, 23)">

    <!-- Legs -->
    <g fill="#111111">
      <rect x="7" y="21" width="2" height="2"/>
      <rect x="15" y="21" width="2" height="2"/>
    </g>

    <g id="body-js">
      <g class="breathe-anim">
        <!-- Tail -->
        <rect x="19" y="18" width="2" height="2" fill="#111111"/>
        <rect x="21" y="15" width="2" height="4" fill="#111111"/>
        <rect x="22" y="12" width="2" height="4" fill="#111111"/>
        <rect x="23" y="9" width="2" height="4" fill="#111111"/>

        <!-- Ears -->
        <rect x="6" y="3" width="2" height="4" fill="#111111"/>
        <rect x="7" y="2" width="1" height="1" fill="#111111"/>
        <rect x="16" y="3" width="2" height="4" fill="#111111"/>
        <rect x="16" y="2" width="1" height="1" fill="#111111"/>
        
        <!-- Head and Torso -->
        <rect x="6" y="6" width="12" height="1" fill="#111111"/>
        <rect x="5" y="7" width="14" height="14" fill="#111111"/>
        <rect x="6" y="21" width="12" height="1" fill="#111111"/>

        <!-- Left Arm — happy continuous wave + flower on top -->
        <g class="arm-happy">
          <rect x="3" y="14" width="2" height="2" fill="#111111"/>
          <!-- Flower held at hand tip -->
          <!-- Stem (white, from hand top to flower) -->
          <rect x="3.5" y="11" width="0.5" height="3" fill="#FFFFFF"/>
          <!-- Petals (yellow pixel cross) -->
          <rect x="2.5" y="10" width="0.8" height="0.8" fill="#FFD700"/>
          <rect x="4.5" y="10" width="0.8" height="0.8" fill="#FFD700"/>
          <rect x="3.5" y="9.2" width="0.8" height="0.8" fill="#FFD700"/>
          <rect x="3.5" y="10.8" width="0.8" height="0.8" fill="#FFD700"/>
          <!-- Center -->
          <rect x="3.5" y="10" width="0.8" height="0.8" fill="#FFA000"/>
        </g>

        <!-- Right Arm -->
        <rect x="19" y="14" width="2" height="2" fill="#111111"/>

        <!-- Eyes: ^^ happy squint with blink -->
        <g class="eyes-happy-blink" fill="#FFFFFF">
          <!-- Left Eye (Happy Curve) -->
          <rect x="6" y="10" width="5" height="1"/>
          <rect x="6" y="11" width="1" height="1"/>
          <rect x="10" y="11" width="1" height="1"/>

          <!-- Right Eye (Happy Curve) -->
          <rect x="13" y="10" width="5" height="1"/>
          <rect x="13" y="11" width="1" height="1"/>
          <rect x="17" y="11" width="1" height="1"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Sparkles (outside rotation = stay upright, within window bounds) -->
  <use href="#px-sparkle" x="2" y="5"  fill="#FFD700" style="--delay: 0s"/>
  <use href="#px-sparkle" x="-1" y="11"  fill="#FFA000" style="--delay: 0.4s"/>
  <use href="#px-sparkle" x="5"  y="0" fill="#FFF59D" style="--delay: 0.8s"/>
</svg>