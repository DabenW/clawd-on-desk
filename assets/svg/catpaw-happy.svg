<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 45 45" width="500" height="500">
  <defs>
    <style>
      /* Bouncing Character Body */
      .bounce-anim {
        transform-origin: 12px 23px; /* Base of the feet */
        animation: bounce 1s infinite ease-in-out;
      }
      
      /* Ground Shadow Pulse */
      .shadow-anim {
        transform-origin: 12px 23.5px;
        animation: shadow 1s infinite ease-in-out;
      }

      /* Enthusiastic Waving Arms */
      .arm-l {
        transform-origin: 5px 15px; /* Shoulder joint */
        animation: wave-l 0.15s infinite alternate ease-in-out;
      }
      .arm-r {
        transform-origin: 19px 15px; /* Shoulder joint */
        animation: wave-r 0.15s infinite alternate ease-in-out;
      }

      /* Happy Blinking Eyes */
      .eyes-blink {
        transform-origin: 12px 11px;
        animation: blink 2s infinite linear;
      }

      /* Pixel-Art Sparkle Animations (Frame-by-frame style) */
      .spark-center {
        opacity: 0;
        animation: flash-center 1.5s infinite step-end;
        animation-delay: var(--delay, 0s);
      }
      
      .spark-outer {
        opacity: 0;
        animation: flash-outer 1.5s infinite step-end;
        animation-delay: var(--delay, 0s);
      }

      /* Character Keyframes - ONLY STRETCH, NO JUMP */
      @keyframes bounce {
        0%, 15%, 100% { transform: scaleY(1); }
        20% { transform: scaleY(0.85); }     /* Anticipation squash */
        40% { transform: scaleY(1.15); }     /* Fast stretch up */
        50% { transform: scaleY(1.2); }      /* Max stretch */
        60% { transform: scaleY(1.15); }     /* Fast stretch down */
        80% { transform: scaleY(0.85); }     /* Landing squash */
        85% { transform: scaleY(1); }        /* Recover */
      }

      @keyframes shadow {
        0%, 15%, 100% { transform: scale(1); opacity: 0.3; }
        20% { transform: scale(1.1); opacity: 0.4; }
        40% { transform: scale(0.9); opacity: 0.25; }
        50% { transform: scale(0.85); opacity: 0.2; }
        60% { transform: scale(0.9); opacity: 0.25; }
        80% { transform: scale(1.1); opacity: 0.4; }
        85% { transform: scale(1); opacity: 0.3; }
      }

      @keyframes wave-l {
        0% { transform: rotate(45deg); }
        100% { transform: rotate(85deg); }
      }

      @keyframes wave-r {
        0% { transform: rotate(-45deg); }
        100% { transform: rotate(-85deg); }
      }

      @keyframes blink {
        0%, 46%, 54%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.1); }
      }

      /* 
        True 8-Bit Sparkle Timeline:
        1. Small center dot appears
        2. Outer arms appear (Full Star)
        3. Center dot disappears (Hollow Ring)
        4. Everything disappears 
      */
      @keyframes flash-center {
        0%  { opacity: 0; }
        10% { opacity: 1; }  /* Small dot */
        30% { opacity: 0; }  /* Disappears, leaving hollow star */
        100%{ opacity: 0; }
      }
      
      @keyframes flash-outer {
        0%  { opacity: 0; }
        20% { opacity: 1; }  /* Outer arms appear to complete the star */
        40% { opacity: 0; }  /* Entire star disappears */
        100%{ opacity: 0; }
      }
    </style>

    <!-- Reusable Pixel Art Sparkle Definition -->
    <g id="px-sparkle">
      <!-- Center pixel -->
      <rect class="spark-center" x="-0.5" y="-0.5" width="1" height="1" />
      <!-- Outer 4 pixels forming the cross -->
      <path class="spark-outer" d="M -0.5,-1.5 h1 v1 h-1 z 
                                   M -0.5,0.5 h1 v1 h-1 z 
                                   M -1.5,-0.5 h1 v1 h-1 z 
                                   M 0.5,-0.5 h1 v1 h-1 z" />
    </g>
  </defs>

  <!-- Ground Shadow -->
  <rect id="ground-shadow" class="shadow-anim" x="3" y="23" width="18" height="1" fill="#000000"/>

  <!-- Pixel-Art Sparkle Particles Group -->
  <g class="sparkles">
    <use href="#px-sparkle" x="1" y="6" fill="#FFD700" style="--delay: 0.0s"/>
    <use href="#px-sparkle" x="23" y="4" fill="#FFA000" style="--delay: 0.3s"/>
    <use href="#px-sparkle" x="25" y="18" fill="#FFF59D" style="--delay: 0.6s"/>
    <use href="#px-sparkle" x="-1" y="20" fill="#FFC107" style="--delay: 0.9s"/>
    <use href="#px-sparkle" x="12" y="0" fill="#FFF59D" style="--delay: 1.2s"/>
    <use href="#px-sparkle" x="3" y="14" fill="#FFD700" style="--delay: 0.7s"/>
  </g>

  <!-- Main Animated Character -->
  <g class="bounce-anim">
    <!-- Legs -->
    <g id="legs" fill="#111111">
      <rect x="7" y="21" width="2" height="2"/>
      <rect x="15" y="21" width="2" height="2"/>
    </g>

    <!-- Tail -->
    <rect x="19" y="18" width="2" height="2" fill="#111111"/>
    <rect x="21" y="15" width="2" height="4" fill="#111111"/>
    <rect x="22" y="12" width="2" height="4" fill="#111111"/>
    <rect x="23" y="9" width="2" height="4" fill="#111111"/>

    <!-- Ears -->
    <rect x="6" y="3" width="2" height="4" fill="#111111"/>
    <rect x="7" y="2" width="1" height="1" fill="#111111"/>
    <rect x="16" y="3" width="2" height="4" fill="#111111"/>
    <rect x="16" y="2" width="1" height="1" fill="#111111"/>
    
    <!-- Head and Torso -->
    <rect x="6" y="6" width="12" height="1" fill="#111111"/>
    <rect x="5" y="7" width="14" height="14" fill="#111111"/>
    <rect x="6" y="21" width="12" height="1" fill="#111111"/>

    <!-- Waving Arms -->
    <g class="arm-l">
      <rect x="3" y="14" width="2" height="2" fill="#111111"/>
    </g>
    <g class="arm-r">
      <rect x="19" y="14" width="2" height="2" fill="#111111"/>
    </g>
    
    <!-- Happy Eyes (Closed Curves) -->
    <g class="eyes-blink" fill="#FFFFFF">
      <!-- Left Eye (Happy Curve) -->
      <rect x="6" y="10" width="5" height="1"/>
      <rect x="6" y="11" width="1" height="1"/>
      <rect x="10" y="11" width="1" height="1"/>

      <!-- Right Eye (Happy Curve) -->
      <rect x="13" y="10" width="5" height="1"/>
      <rect x="13" y="11" width="1" height="1"/>
      <rect x="17" y="11" width="1" height="1"/>
    </g>
  </g>
</svg>