<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 45 45" width="500" height="500">
  <defs>
    <style>
      /* Dozing — looping gentle breathing in yawn-end squashed pose, eyes shut */
      .doze-body {
        transform-origin: 12px 23px;
        animation: doze-breathe 4s infinite ease-in-out;
      }

      .doze-shadow {
        transform-origin: 12px 23.5px;
        animation: doze-shadow 4s infinite ease-in-out;
      }

      .eyes-shut {
        transform-origin: 12px 11px;
        transform: scaleY(0.1);
        transition: transform 0.3s ease-out;
      }

      .arm-l-doze {
        transform-origin: 5px 15px;
        transform: translate(0px, 1px) rotate(-15deg);
      }

      .arm-r-doze {
        transform-origin: 19px 15px;
        transform: translate(0px, 1px) rotate(15deg);
      }

      @keyframes doze-breathe {
        0%, 100% { transform: scale(1.05, 0.95) translate(0, 1px); }
        50% { transform: scale(1.08, 0.92) translate(0, 1.8px); }
      }

      @keyframes doze-shadow {
        0%, 100% { transform: scaleX(1.05); opacity: 0.35; }
        50% { transform: scaleX(1.08); opacity: 0.3; }
      }
    </style>
  </defs>

  <!-- Ground Shadow -->
  <rect class="doze-shadow" x="3" y="23" width="18" height="1" fill="#000000" opacity="0.35"/>

  <!-- Static Legs -->
  <g id="legs" fill="#111111">
    <rect x="7" y="21" width="2" height="2"/>
    <rect x="15" y="21" width="2" height="2"/>
  </g>

  <!-- Dozing Body (squashed yawn-end pose + gentle breathing) -->
  <g class="doze-body">
    <!-- Tail -->
    <rect x="19" y="18" width="2" height="2" fill="#111111"/>
    <rect x="21" y="15" width="2" height="4" fill="#111111"/>
    <rect x="22" y="12" width="2" height="4" fill="#111111"/>
    <rect x="23" y="9" width="2" height="4" fill="#111111"/>

    <!-- Ears -->
    <rect x="6" y="3" width="2" height="4" fill="#111111"/>
    <rect x="7" y="2" width="1" height="1" fill="#111111"/>
    <rect x="16" y="3" width="2" height="4" fill="#111111"/>
    <rect x="16" y="2" width="1" height="1" fill="#111111"/>
    
    <!-- Head and Torso -->
    <rect x="6" y="6" width="12" height="1" fill="#111111"/>
    <rect x="5" y="7" width="14" height="14" fill="#111111"/>
    <rect x="6" y="21" width="12" height="1" fill="#111111"/>

    <!-- Left Arm (relaxed down) -->
    <g class="arm-l-doze">
      <rect x="3" y="14" width="2" height="2" fill="#111111"/>
    </g>
    <!-- Right Arm (relaxed down) -->
    <g class="arm-r-doze">
      <rect x="19" y="14" width="2" height="2" fill="#111111"/>
    </g>

    <!-- Eyes shut (JS can open via style.transform override) -->
    <g id="eyes-doze" class="eyes-shut" fill="#FFFFFF">
      <!-- Left Eye -->
      <rect x="6" y="10" width="5" height="3" fill="#FFFFFF"/>
      <rect x="7" y="13" width="3" height="1" fill="#FFFFFF"/>
      <rect x="8" y="10" width="2" height="2" fill="#111111"/>

      <!-- Right Eye -->
      <rect x="13" y="10" width="5" height="3" fill="#FFFFFF"/>
      <rect x="14" y="13" width="3" height="1" fill="#FFFFFF"/>
      <rect x="14" y="10" width="2" height="2" fill="#111111"/>
    </g>
  </g>
</svg>