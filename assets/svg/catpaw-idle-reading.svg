<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 45 45" width="500" height="500">
  <defs>
    <style>
      /* ═══ 14s story: arm sway → grab book → read (with thought bits) → book slides away ═══ */

      /* ── Independent ── */

      .breathe {
        transform-origin: 12px 20px;
        animation: breathe 3.2s infinite ease-in-out;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1, 1) translate(0, 0); }
        50% { transform: scale(1.02, 0.98) translate(0, 0.5px); }
      }

      .blink {
        transform-origin: 12px 11px;
        animation: blink 5s infinite;
      }
      @keyframes blink {
        0%, 6%, 100% { transform: scaleY(1); }
        3% { transform: scaleY(0.1); }
      }

      .shadow {
        transform-origin: 12px 23.5px;
        animation: shadow-breathe 3.2s infinite ease-in-out;
      }
      @keyframes shadow-breathe {
        0%, 100% { transform: scaleX(1); opacity: 0.3; }
        50% { transform: scaleX(1.03); opacity: 0.27; }
      }

      /* ── Main 14s ── */

      /* Body: nod twice during reading */
      .body-nod {
        animation: body-nod 14s infinite ease-in-out;
      }
      @keyframes body-nod {
        0%, 36%, 44%, 54%, 62%, 100% { transform: translateY(0); }
        40% { transform: translateY(0.4px); }
        58% { transform: translateY(0.4px); }
      }

      /* Left arm: BIG casual sway → reach → hold → follow book → return */
      .arm-l {
        transform-origin: 5px 15px;
        animation: arm-l-anim 14s infinite ease-in-out;
      }
      @keyframes arm-l-anim {
        /* sway (big, visible fidgeting) */
        0%        { transform: translate(0, 0) rotate(0deg); }
        2.5%      { transform: translate(-0.5px, 0) rotate(25deg); }
        5%        { transform: translate(0.3px, 0) rotate(-20deg); }
        7.5%      { transform: translate(-0.5px, 0) rotate(22deg); }
        10%       { transform: translate(0, 0) rotate(0deg); }
        /* reach out left to grab book */
        18%       { transform: translate(-1px, -1px) rotate(15deg); }
        /* bring to chest (hand visible at book left edge) */
        26%       { transform: translate(2px, 0) rotate(-5deg); }
        /* hold during reading */
        76%       { transform: translate(2px, 0) rotate(-5deg); }
        /* follow book sliding down */
        84%       { transform: translate(1px, 2px) rotate(0deg); }
        /* return to normal */
        92%       { transform: translate(0, 0) rotate(0deg); }
        100%      { transform: translate(0, 0) rotate(0deg); }
      }

      /* Right arm: nudge inward during reading */
      .arm-r {
        animation: arm-r-anim 14s infinite ease-in-out;
      }
      @keyframes arm-r-anim {
        0%, 22%   { transform: translate(0, 0); }
        28%, 76%  { transform: translate(-1px, 0); }
        84%, 100% { transform: translate(0, 0); }
      }

      /* Book: appear in hand → widen to chest → slide down → gone */
      .book {
        opacity: 0;
        transform-origin: 12px 16.5px;
        animation: book-anim 14s infinite ease-in-out;
      }
      @keyframes book-anim {
        0%, 12%   { opacity: 0; transform: translate(-5px, -2px) scaleX(0.5); }
        18%       { opacity: 1; transform: translate(-5px, -2px) scaleX(0.5); }
        26%       { opacity: 1; transform: translate(0, 0) scaleX(1); }
        76%       { opacity: 1; transform: translate(0, 0) scaleX(1); }
        84%       { opacity: 0; transform: translate(0, 4px) scaleX(0.8); }
        100%      { opacity: 0; transform: translate(0, 4px) scaleX(0.8); }
      }

      /* Eyes: normal → slow gaze down → drift → normal */
      .eyes-read {
        animation: eyes-read 14s infinite ease-in-out;
      }
      @keyframes eyes-read {
        0%, 22%   { transform: translate(0, 0); }
        30%       { transform: translate(0, 0.5px); }
        46%       { transform: translate(-0.3px, 0.5px); }
        60%       { transform: translate(0.3px, 0.5px); }
        70%       { transform: translate(0, 0.5px); }
        80%, 100% { transform: translate(0, 0); }
      }

      /* ── Thought particles (visible only during reading) ── */
      .reading-fx {
        animation: reading-fx-vis 14s infinite;
      }
      @keyframes reading-fx-vis {
        0%, 27%   { opacity: 0; }
        32%, 75%  { opacity: 1; }
        78%, 100% { opacity: 0; }
      }

      .thought-bit {
        opacity: 0;
        animation: float-thought 2.5s infinite linear;
      }
      .t1 { animation-delay: 0s; }
      .t2 { animation-delay: -0.7s; }
      .t3 { animation-delay: -1.4s; }
      .t4 { animation-delay: -2.1s; }

      @keyframes float-thought {
        0%   { transform: translateY(0); opacity: 0; }
        10%  { opacity: 0.6; }
        100% { transform: translateY(-12px); opacity: 0; }
      }
    </style>
  </defs>

  <!-- Ground shadow -->
  <rect class="shadow" x="3" y="23" width="18" height="1" fill="#000000" opacity="0.3"/>

  <!-- Thought particles (behind body, float up during reading) -->
  <g class="reading-fx">
    <rect class="thought-bit t1" x="7"  y="9" width="2" height="2" fill="#40C4FF"/>
    <rect class="thought-bit t2" x="13"  y="8" width="1.5" height="1.5" fill="#B388FF"/>
    <rect class="thought-bit t3" x="17" y="10" width="2" height="2" fill="#40C4FF"/>
    <rect class="thought-bit t4" x="10"  y="8" width="1.5" height="1.5" fill="#69F0AE"/>
  </g>

  <!-- Nod wrapper -->
  <g class="body-nod">

    <!-- ── Body layer ── -->
    <g class="breathe">
      <!-- Legs (idle style) -->
      <g fill="#111111">
        <rect x="7" y="21" width="2" height="2"/>
        <rect x="15" y="21" width="2" height="2"/>
      </g>

      <!-- Tail -->
      <rect x="19" y="18" width="2" height="2" fill="#111111"/>
      <rect x="21" y="15" width="2" height="4" fill="#111111"/>
      <rect x="22" y="12" width="2" height="4" fill="#111111"/>
      <rect x="23" y="9" width="2" height="4" fill="#111111"/>

      <!-- Ears -->
      <rect x="6" y="3" width="2" height="4" fill="#111111"/>
      <rect x="7" y="2" width="1" height="1" fill="#111111"/>
      <rect x="16" y="3" width="2" height="4" fill="#111111"/>
      <rect x="16" y="2" width="1" height="1" fill="#111111"/>
      
      <!-- Head and Torso -->
      <rect x="6" y="6" width="12" height="1" fill="#111111"/>
      <rect x="5" y="7" width="14" height="14" fill="#111111"/>
      <rect x="6" y="21" width="12" height="1" fill="#111111"/>

      <!-- Eyes -->
      <g class="eyes-read">
        <g class="blink">
          <!-- Left Eye -->
          <rect x="6" y="10" width="5" height="3" fill="#FFFFFF"/>
          <rect x="7" y="13" width="3" height="1" fill="#FFFFFF"/>
          <rect x="8" y="10" width="2" height="2" fill="#111111"/>

          <!-- Right Eye -->
          <rect x="13" y="10" width="5" height="3" fill="#FFFFFF"/>
          <rect x="14" y="13" width="3" height="1" fill="#FFFFFF"/>
          <rect x="14" y="10" width="2" height="2" fill="#111111"/>
        </g>
      </g>
    </g>

    <!-- ── Book layer (on top of body, chest level) ── -->
    <g class="breathe">
      <g class="book">
        <!-- Back cover (blue) -->
        <rect x="6" y="15" width="12" height="4" fill="#4A90D9"/>
        <!-- Spine -->
        <rect x="12" y="15" width="1" height="4" fill="#2E6AB0"/>
        <!-- Page edges (top) -->
        <rect x="7" y="14.5" width="10" height="0.5" fill="#FFFDE7"/>
        <!-- Page edges (right side) -->
        <rect x="17.5" y="15.5" width="0.5" height="3" fill="#FFFDE7"/>
        <!-- Title plate -->
        <rect x="7.5" y="15.5" width="7" height="1.5" fill="#E3F2FD" opacity="0.5"/>
        <!-- Title text blocks -->
        <rect x="8" y="15.8" width="5" height="0.5" fill="#2E6AB0"/>
        <rect x="8.5" y="16.5" width="3" height="0.3" fill="#2E6AB0" opacity="0.6"/>
        <!-- Small deco block -->
        <rect x="9" y="17.5" width="3" height="0.5" fill="#E3F2FD" opacity="0.4"/>
      </g>
    </g>

    <!-- ── Arms layer (on top of book) ── -->
    <g class="breathe">
      <g fill="#111111">
        <g class="arm-l"><rect x="3" y="14" width="2" height="2"/></g>
        <g class="arm-r"><rect x="19" y="14" width="2" height="2"/></g>
      </g>
    </g>

  </g>
</svg>