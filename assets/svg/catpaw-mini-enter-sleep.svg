<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="-15 -15 45 45"
  shape-rendering="crispEdges">
    <defs>
    <clipPath id="body-clip">
      <rect x="6" y="6" width="12" height="1" />
      <rect x="5" y="7" width="14" height="14" />
      <rect x="6" y="21" width="12" height="1" />
    </clipPath>
  </defs>
  <style>
      #body-js {
        animation: bodyEnter 3.2s cubic-bezier(0.22, 1, 0.36, 1) 1 forwards;
      }

      #left-arm {
        transform-origin: 5px 15px;
        animation: armEnterSleep 3.2s ease-in-out 1 forwards;
      }

      /* Eyes stay closed — wide dashes like sleeping pose */

      @keyframes bodyEnter {
        0% {
          transform: translate(25px, 0px);
        }
        18% {
          transform: translate(-3px, -0.8px);
        }
        24% {
          transform: translate(1.4px, 0.4px);
        }
        30%,
        100% {
          transform: translate(0px, 0px);
        }
      }

      /* Arm extends out gently, no waving */
      @keyframes armEnterSleep {
        0%,
        30% {
          transform: scaleX(0.05) rotate(0deg);
        }
        50% {
          transform: scaleX(1) rotate(0deg);
        }
        100% {
          transform: scaleX(1) rotate(0deg);
        }
      }
    </style>
    <g id="body-js">
      <g transform="rotate(-12, 12, 23)">
        <rect id="left-arm" x="3" y="14" width="2" height="2" fill="#111111"/>

        <!-- Tail -->
        <rect x="19" y="18" width="2" height="2" fill="#111111"/>
        <rect x="21" y="15" width="2" height="4" fill="#111111"/>
        <rect x="22" y="12" width="2" height="4" fill="#111111"/>
        <rect x="23" y="9" width="2" height="4" fill="#111111"/>

        <!-- Ears -->
        <rect x="6" y="3" width="2" height="4" fill="#111111"/>
        <rect x="7" y="2" width="1" height="1" fill="#111111"/>
        <rect x="16" y="3" width="2" height="4" fill="#111111"/>
        <rect x="16" y="2" width="1" height="1" fill="#111111"/>
        
        <!-- Head and Torso -->
        <rect x="6" y="6" width="12" height="1" fill="#111111"/>
        <rect x="5" y="7" width="14" height="14" fill="#111111"/>
        <rect x="6" y="21" width="12" height="1" fill="#111111"/>

        <rect x="19" y="14" width="2" height="2" fill="#111111"/>

        <g clip-path="url(#body-clip)">
          <g id="eyes-js" fill="#FFFFFF">
            <!-- Eyes closed — wide dashes like sleeping pose -->
            <rect x="6" y="11" width="5" height="1"/>
            <rect x="13" y="11" width="5" height="1"/>
          </g>
        </g>

        <g fill="#111111">
          <rect x="7" y="21" width="2" height="2"/>
          <rect x="15" y="21" width="2" height="2"/>
        </g>
      </g>
    </g>
  </svg>