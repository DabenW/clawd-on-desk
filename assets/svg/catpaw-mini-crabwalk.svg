<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 45 45" width="500" height="500">
  <defs>
    <style>
      .body-hunch {
        transform-origin: 12px 23px;
        animation: hunch-walk 2s infinite alternate ease-in-out;
      }
      .leg-1 { animation: sneak-1 0.5s infinite linear; transform-origin: 8px 21px; }
      .leg-2 { animation: sneak-2 0.5s infinite linear; transform-origin: 16px 21px; }
      .shadow-sneak {
        transform-origin: 12px 23.5px;
        animation: shadow-shift 2s infinite alternate ease-in-out;
      }

      /* Sneaking forward and backward */
      @keyframes hunch-walk {
        0% { transform: translate(-2px, 1px) rotate(2deg); }
        100% { transform: translate(3px, 1px) rotate(2deg); }
      }
      @keyframes shadow-shift {
        0% { transform: translateX(-2px) scale(0.9); opacity: 0.25; }
        100% { transform: translateX(3px) scale(0.9); opacity: 0.25; }
      }

      /* Fast tiptoe / sneak leg movement */
      @keyframes sneak-1 {
        0%, 100% { transform: rotate(0deg) scaleY(1); }
        50% { transform: rotate(-25deg) scaleY(0.7); }
      }
      @keyframes sneak-2 {
        0%, 100% { transform: rotate(-25deg) scaleY(0.7); }
        50% { transform: rotate(0deg) scaleY(1); }
      }

      /* Eyes: look right (toward destination), occasionally glance back and blink */
      .eyes-crabwalk {
        transform-origin: 12px 11px;
        animation: crab-eyes 5s infinite ease-in-out;
      }
      @keyframes crab-eyes {
        0%, 55%  { transform: translateX(2px) scaleY(1); }
        62%      { transform: translateX(0) scaleY(1); }
        66%      { transform: translateX(0) scaleY(0.1); }
        70%      { transform: translateX(0) scaleY(1); }
        75%      { transform: translateX(0) scaleY(0.1); }
        80%, 85% { transform: translateX(0) scaleY(1); }
        92%, 100% { transform: translateX(2px) scaleY(1); }
      }
    </style>
  </defs>

  <rect id="ground-shadow" class="shadow-sneak" x="3" y="23" width="18" height="1" fill="#000000" opacity="0.3"/>

  <g class="body-hunch">
    <g id="legs" fill="#111111">
      <rect id="outer-left-leg" class="leg-1" x="7" y="21" width="2" height="2"/>
      <rect id="inner-left-leg" class="leg-2" x="15" y="21" width="2" height="2"/>
    </g>

    <!-- Tail -->
    <rect x="19" y="18" width="2" height="2" fill="#111111"/>
    <rect x="21" y="15" width="2" height="4" fill="#111111"/>
    <rect x="22" y="12" width="2" height="4" fill="#111111"/>
    <rect x="23" y="9" width="2" height="4" fill="#111111"/>

    <!-- Ears -->
    <rect x="6" y="3" width="2" height="4" fill="#111111"/>
    <rect x="7" y="2" width="1" height="1" fill="#111111"/>
    <rect x="16" y="3" width="2" height="4" fill="#111111"/>
    <rect x="16" y="2" width="1" height="1" fill="#111111"/>
    
    <!-- Head and Torso -->
    <rect x="6" y="6" width="12" height="1" fill="#111111"/>
    <rect x="5" y="7" width="14" height="14" fill="#111111"/>
    <rect x="6" y="21" width="12" height="1" fill="#111111"/>

    <!-- Left arm (normal pose) -->
    <rect id="left-arm" x="3" y="14" width="2" height="2" fill="#111111"/>
    <!-- Right arm (normal pose, no magnifying glass) -->
    <rect id="right-arm" x="19" y="14" width="2" height="2" fill="#111111"/>

    <!-- Eyes: look right, occasionally glance back + blink -->
    <g class="eyes-crabwalk">
      <!-- Left Eye -->
      <rect x="6" y="10" width="5" height="3" fill="#FFFFFF"/>
      <rect x="7" y="13" width="3" height="1" fill="#FFFFFF"/>
      <rect x="8" y="10" width="2" height="2" fill="#111111"/>

      <!-- Right Eye -->
      <rect x="13" y="10" width="5" height="3" fill="#FFFFFF"/>
      <rect x="14" y="13" width="3" height="1" fill="#FFFFFF"/>
      <rect x="14" y="10" width="2" height="2" fill="#111111"/>
    </g>
  </g>
</svg>