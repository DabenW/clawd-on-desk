<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 45 45" width="500" height="500">
  <defs>
    <style>
      /* Body sways side to side (held from above) */
      .body-sway {
        transform-origin: 12px 6px;
        animation: sway 1.2s infinite alternate ease-in-out;
      }

      /* Leg dangling (from debugger sneak) */
      .leg-dangle-1 {
        animation: dangle-1 0.5s infinite linear;
        transform-origin: 8px 21px;
      }
      .leg-dangle-2 {
        animation: dangle-2 0.5s infinite linear;
        transform-origin: 16px 21px;
      }

      /* Arm flailing (from happy wave, slightly slower) */
      .arm-flail-l {
        transform-origin: 5px 15px;
        animation: flail-l 0.2s infinite alternate ease-in-out;
      }
      .arm-flail-r {
        transform-origin: 19px 15px;
        animation: flail-r 0.2s infinite alternate ease-in-out;
      }

      /* Shadow shrinks when lifted */
      .shadow-lift {
        transform-origin: 12px 23.5px;
        animation: shadow-pulse 1.2s infinite alternate ease-in-out;
      }

      @keyframes sway {
        0%   { transform: rotate(-3deg) translate(-1px, 0); }
        100% { transform: rotate(3deg) translate(1px, 0); }
      }

      @keyframes dangle-1 {
        0%, 100% { transform: rotate(0deg) scaleY(1); }
        50%      { transform: rotate(-25deg) scaleY(0.7); }
      }
      @keyframes dangle-2 {
        0%, 100% { transform: rotate(-25deg) scaleY(0.7); }
        50%      { transform: rotate(0deg) scaleY(1); }
      }

      @keyframes flail-l {
        0%   { transform: rotate(45deg); }
        100% { transform: rotate(85deg); }
      }
      @keyframes flail-r {
        0%   { transform: rotate(-45deg); }
        100% { transform: rotate(-85deg); }
      }

      @keyframes shadow-pulse {
        0%   { transform: scale(0.7); opacity: 0.1; }
        100% { transform: scale(0.8); opacity: 0.15; }
      }
    </style>
  </defs>

  <!-- Ground Shadow (small + faint = lifted off ground) -->
  <rect class="shadow-lift" x="3" y="23" width="18" height="1" fill="#000000" opacity="0.15"/>

  <!-- Swaying body -->
  <g class="body-sway">
    <!-- Dangling legs -->
    <g fill="#111111">
      <rect class="leg-dangle-1" x="7" y="21" width="2" height="2"/>
      <rect class="leg-dangle-2" x="15" y="21" width="2" height="2"/>
    </g>

    <!-- Torso + flailing arms -->
    <!-- Tail -->
    <rect x="19" y="18" width="2" height="2" fill="#111111"/>
    <rect x="21" y="15" width="2" height="4" fill="#111111"/>
    <rect x="22" y="12" width="2" height="4" fill="#111111"/>
    <rect x="23" y="9" width="2" height="4" fill="#111111"/>

    <!-- Ears -->
    <rect x="6" y="3" width="2" height="4" fill="#111111"/>
    <rect x="7" y="2" width="1" height="1" fill="#111111"/>
    <rect x="16" y="3" width="2" height="4" fill="#111111"/>
    <rect x="16" y="2" width="1" height="1" fill="#111111"/>
    
    <!-- Head and Torso -->
    <rect x="6" y="6" width="12" height="1" fill="#111111"/>
    <rect x="5" y="7" width="14" height="14" fill="#111111"/>
    <rect x="6" y="21" width="12" height="1" fill="#111111"/>

    <g class="arm-flail-l">
      <rect x="3" y="14" width="2" height="2" fill="#111111"/>
    </g>
    <g class="arm-flail-r">
      <rect x="19" y="14" width="2" height="2" fill="#111111"/>
    </g>

    <!-- >< Eyes (anime squint, drawn with thin lines) -->
    <g fill="none" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <!-- Left eye: > -->
      <polyline points="7,11 9,13 7,14"/>
      <!-- Right eye: < -->
      <polyline points="14,11 16,13 14,14"/>
    </g>
  </g>
</svg>